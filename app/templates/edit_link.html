{% extends "base.html" %}

{% block content %}

<h2>Edit Link</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Title</label>
        <input name="title" class="form-control" value="{{ link.title }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">URL</label>
        <input name="url" class="form-control" value="{{ link.url }}" required>
    </div>

    <button class="btn btn-primary">Save Changes</button>
    <a href="/{{ username }}/links" class="btn btn-outline-secondary">Cancel</a>

</form>

{% endblock %}
