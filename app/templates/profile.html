{% extends "base.html" %}

{% block content %}

<div class="text-center">

    {% if user.profile_image_url %}
    <img src="{{ user.profile_image_url }}" alt="{{ user.username }} profile image" class="rounded-circle mb-3"
        width="140" height="140" style="object-fit: cover;">
    {% endif %}

    <h1>{{ user.username }}</h1>
    <p class="text-muted">{{ user.bio }}</p>

    <a href="/{{ user.username }}/edit" class="btn btn-outline-secondary mb-3">
        Edit Profile
    </a>

    <div class="mt-4">

        {% for link in links %}

        <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
            <a href="{{ link.url }}" class="btn btn-dark" style="min-width: 240px;">
                {{ link.title }}
            </a>
            <a href="/{{ user.username }}/links/{{ link.link_id }}/edit" class="btn btn-outline-secondary">
                Edit
            </a>
        </div>

        {% endfor %}

    </div>

    <a href="/{{ user.username }}/links" class="btn btn-primary mt-3">
        Add Link
    </a>

</div>

{% endblock %}
